<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Linda Ghari | Architekturdesignerin (M.A.)</title>

<style>
body {
  margin: 0;
  font-family: Inter, Arial, Helvetica, sans-serif;
  background: #f6f6f6;
  color: #222;
  line-height: 1.6;
}

/* ===== HERO ===== */
header {
  min-height: 100vh;
  padding: 120px 20px;
  box-sizing: border-box;
  background: linear-gradient(135deg, rgba(44,62,80,0.9), rgba(106,137,204,0.85));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero {
  max-width: 1000px;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 60px;
  align-items: center;
}

/* ===== MENU ===== */
.menu-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  background: #000;
  color: #fff;
  font-size: 1.8rem;
  padding: 10px;
  cursor: pointer;
}

nav {
  position: fixed;
  right: -280px;
  width: 280px;
  height: 100vh;
  background: #111;
  padding: 100px 30px;
  transition: 0.3s;
}
nav.active { right: 0; }

nav button {
  display: block;
  color: #fff;
  background: none;
  border: none;
  margin-bottom: 20px;
  cursor: pointer;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff;
  padding: 80px 20px;
  overflow-y: auto;
}
.modal.active { display: block; }

.modal-close {
  position: fixed;
  right: 20px;
  top: 20px;
  font-size: 2rem;
  cursor: pointer;
}

/* ===== PROJECTS ===== */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 20px;
}

.project-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  align-items: center;
  justify-content: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  color: white;
  cursor: pointer;
  padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

</style>
</head>

<body>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="menu">
  <button onclick="openModal('about')">Über mich</button>
  <button onclick="openModal('projects')">Projekte</button>
  <button onclick="openModal('contact')">Kontakt</button>
</nav>

<header>
<div class="hero">
<div>
<h1>Linda Ghari</h1>
<h2>Architekturdesignerin (M.A.)</h2>
</div>
<img src="images/profile.jpg">
</div>
</header>

<section id="projects" class="modal">
<div class="modal-close" onclick="closeModal()">×</div>

<div class="projects">

<div class="project-card"
data-images="projects/project1-1.jpg,projects/project1-2.jpg,projects/project1-3.jpg">
<img src="projects/project1-1.jpg">
</div>

<div class="project-card"
data-images="projects/project2-1.jpg,projects/project2-2.jpg">
<img src="projects/project2-1.jpg">
</div>

</div>
</section>

<div class="lightbox" id="lightbox">
<span class="nav prev" onclick="prev()">❮</span>
<img id="lightbox-img">
<span class="nav next" onclick="next()">❯</span>
</div>

<script>
const menu = document.getElementById('menu');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

let currentImages = [];
let currentIndex = 0;

function toggleMenu(){
  menu.classList.toggle('active');
}

function openModal(id){
  document.getElementById(id).classList.add('active');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
}

document.querySelectorAll('.project-card').forEach(card=>{
  const images = card.dataset.images.split(',');

  card.addEventListener('click', ()=>{
    currentImages = images;
    currentIndex = 0;
    showImage();
    lightbox.style.display = 'flex';
  });
});

function showImage(){
  lightboxImg.src = currentImages[currentIndex];
}

function next(){
  currentIndex = (currentIndex + 1) % currentImages.length;
  showImage();
}

function prev(){
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  showImage();
}

lightbox.addEventListener('click', (e)=>{
  if(e.target === lightbox){
    lightbox.style.display = 'none';
  }
});
</script>

</body>
</html>
