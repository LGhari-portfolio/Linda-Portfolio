<!DOCTYPE html><html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Linda Ghari | Architekturdesignerin (M.A.)</title><style>
body { margin:0; font-family:Arial; background:#f6f6f6; }

.lightbox {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:1200;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.lightbox img {
  max-width:85%;
  max-height:70%;
}

#lightbox-info {
  color:#fff;
  margin-top:20px;
  text-align:center;
  font-size:14px;
  line-height:1.6;
  max-width:600px;
}

.project-card { cursor:pointer; }
.project-card img { width:100%; height:200px; object-fit:cover; }
</style></head><body><h2 style="padding:20px;">Projekte</h2><div class="project-card"
data-images="
projects/project1-hero.jpg,
projects/project1-before1.jpg,
projects/project1-process1.jpg,
projects/project1-process2.jpg,
projects/project1-detail1.jpg,
projects/project1-final1.jpg
"
data-info="
<b>Projekt:</b> Wohngebäude<br>
<b>Ort:</b> Berlin<br>
<b>Jahr:</b> 2023<br>
<b>Leistung:</b> Entwurf & Ausführung
"><img src="projects/project1-hero.jpg" />
<h3>Wohngebäude</h3>
</div><br><div class="project-card"
data-images="
projects/project2-hero.jpg,
projects/project2-before1.jpg,
projects/project2-process1.jpg,
projects/project2-detail1.jpg,
projects/project2-final1.jpg
"
data-info="
<b>Projekt:</b> Sanierung Wohnungen<br>
<b>Ort:</b> Hamburg<br>
<b>Jahr:</b> 2022<br>
<b>Leistung:</b> Planung & Umsetzung
"><img src="projects/project2-hero.jpg" />
<h3>Sanierung</h3>
</div><!-- LIGHTBOX --><div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" />
  <div id="lightbox-info"></div>
</div><script>
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const infoBox = document.getElementById('lightbox-info');

document.querySelectorAll('.project-card').forEach(card => {
  const images = card.dataset.images.trim().split(',');
  const info = card.dataset.info;

  card.addEventListener('click', () => {
    lightboxImg.src = images[0];
    infoBox.innerHTML = info;
    lightbox.style.display = 'flex';
  });
});
</script></body>
</html>
